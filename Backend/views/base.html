<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><%= title %> | DualCrop Smart Advisory System</title>

    <!-- Bootstrap 5 CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <!-- Font Awesome Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- ========== NAVBAR ========== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-leaf"></i> DualCrop Advisory
            </a>
            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
            >
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/analyze"
                            ><i class="fas fa-microscope"></i> Analyze</a
                        >
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/weather"
                            ><i class="fas fa-cloud-sun"></i> Weather</a
                        >
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard"
                            ><i class="fas fa-chart-bar"></i> Dashboard</a
                        >
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/chatbot"
                            ><i class="fas fa-comments"></i> Chatbot</a
                        >
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about"
                            ><i class="fas fa-info-circle"></i> About</a
                        >
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="flex-grow-1">
        <%- body %>
    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="bg-dark text-white text-center py-4 mt-5 shadow">
        <div class="container">
            <p class="mb-2">
                <strong>DualCrop Smart Advisory System</strong> - AI-Based Crop Disease
                Detection
            </p>
            <p class="mb-0">
                <small>
                    Built with <i class="fas fa-heart text-danger"></i> using Node.js, Python
                    Flask, and Machine Learning
                </small>
            </p>
            <p class="mb-0 mt-3">
                <small>&copy; 2024 DualCrop Team. All rights reserved.</small>
            </p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Script -->
    <script src="/js/main.js"></script>
</body>
</html>
